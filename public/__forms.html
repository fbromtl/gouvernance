<!--
  Netlify Forms detection file for React SPA.
  Netlify parses this at deploy time to discover form schemas.
  This file is never served to users.
-->
<html>
<head><title>Forms</title></head>
<body>
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input type="text" name="prenom" />
    <input type="email" name="email" />
    <input type="text" name="organisme" />
    <textarea name="message"></textarea>
  </form>

  <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="newsletter" />
    <input name="bot-field" />
    <input type="email" name="email" />
  </form>

  <form name="honorary-application" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="honorary-application" />
    <input name="bot-field" />
    <input type="text" name="fullName" />
    <input type="email" name="email" />
    <input type="text" name="jobTitle" />
    <input type="text" name="organization" />
    <input type="text" name="expertise" />
    <input type="url" name="linkedin" />
    <textarea name="motivation"></textarea>
  </form>

  <form name="feature-request" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="feature-request" />
    <input name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <select name="category"></select>
    <input type="text" name="title" />
    <textarea name="description"></textarea>
  </form>
</body>
</html>
